title: LOLBin Execution via regsvr32.exe (Squiblydoo-style)
id: thos-0008
status: experimental
description: >
  Detects process creation where regsvr32.exe is used to execute a
  remote .sct scriptlet — a common signed-binary proxy execution /
  application whitelisting bypass technique.
logsource:
  product: windows
  category: process_creation
detection:
  selection_event:
    event|contains: "1"
  selection_binary:
    detail|contains: "regsvr32"
  condition: selection_event and selection_binary
level: high
tags:
  - attack.defense_evasion
  - attack.t1218.010
