title: LOLBin Execution via rundll32.exe
id: thos-0007
status: experimental
description: >
  Detects process creation (Sysmon Event ID 1) where the command line
  references rundll32.exe invoking a URL/file-protocol handler — a
  well-known living-off-the-land technique for defense evasion.
logsource:
  product: windows
  category: process_creation
detection:
  selection_event:
    event|contains: "1"
  selection_binary:
    detail|contains: "rundll32"
  condition: selection_event and selection_binary
level: medium
tags:
  - attack.defense_evasion
  - attack.execution
  - attack.t1218.011
