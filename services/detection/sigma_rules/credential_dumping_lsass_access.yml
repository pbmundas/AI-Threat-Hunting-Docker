title: Suspicious Process Access to LSASS Memory
id: thos-0003
status: experimental
description: >
  Detects Sysmon ProcessAccess events (Event ID 10) where the accessed
  process detail references lsass.exe — the classic precursor to
  credential dumping via Mimikatz, procdump, or comsvcs.dll MiniDump.
logsource:
  product: windows
  category: process_access
detection:
  selection_event:
    event|contains: "10"
  selection_target:
    detail|contains: "lsass"
  condition: selection_event and selection_target
level: high
tags:
  - attack.credential_access
  - attack.t1003.001
