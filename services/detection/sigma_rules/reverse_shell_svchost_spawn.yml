title: Suspicious svchost.exe Spawning Command Shell (Possible Reverse Shell)
id: thos-0011
status: experimental
description: >
  Detects Sysmon ProcessCreate events (Event ID 1) where svchost.exe
  detail indicates it spawned a command interpreter — svchost.exe should
  never legitimately be a parent of cmd.exe/powershell.exe, a strong
  indicator of process injection or a reverse-shell payload.
logsource:
  product: windows
  category: process_creation
detection:
  selection_event:
    event|contains: "1"
  selection_parent:
    detail|contains: "svchost"
  selection_shell:
    detail|contains:
      - "cmd.exe"
      - "powershell"
  condition: selection_event and selection_parent and selection_shell
level: critical
tags:
  - attack.execution
  - attack.command_and_control
  - attack.t1059.003
  - attack.t1071
