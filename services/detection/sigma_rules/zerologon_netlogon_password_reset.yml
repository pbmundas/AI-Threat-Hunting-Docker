title: Suspicious Netlogon RPC Password Reset (Possible Zerologon)
id: thos-0013
status: experimental
description: >
  Detects Netlogon RPC activity referencing a machine account password
  reset against a domain controller — the hallmark post-exploitation
  step of a Zerologon (CVE-2020-1472) attack chain, often followed by a
  DCSync-style credential dump.
logsource:
  product: windows
  category: security
detection:
  selection:
    detail|contains:
      - "netlogon"
      - "zerologon"
  condition: selection
level: critical
tags:
  - attack.credential_access
  - attack.privilege_escalation
  - attack.t1003
  - attack.t1548
