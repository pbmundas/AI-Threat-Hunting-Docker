# =====================================================================
# THOS :: On-Prem AI Threat Hunting Platform — Phase 1
# =====================================================================
# Stack: Ollama (Qwen) + ChromaDB (RAG) + FastMCP (tools) + LangGraph
#        (orchestrator) + Postgres (audit/state) + Redis (cache) +
#        Gradio Chat UI (hunter interface)
#
# Quickstart:
#   cp .env.example .env          # then edit as needed
#   docker compose up -d --build
#   open http://localhost:7860
#
# Stop:     docker compose down
# Reset:    docker compose down -v   (wipes vector db / postgres / ollama data)
#
# See docs/SCALING_GUIDE.md for how to add new SIEMs, tools, and nodes.
# ---------------------------------------------------------------------

# =====================================================================
# THOS :: On-Prem AI Threat Hunting Platform — Phase 1
# =====================================================================

# ============================================================
# THOS :: On-Prem AI Threat Hunting Platform — Phase 1
# ============================================================

networks:
  thos-net:
    driver: bridge

volumes:
  ollama_data:
  chroma_data:
  postgres_data:
  redis_data:
  sigmahq_rules:

services:

  # ------------------------------------------------------------
  # 1. Ollama — Local LLM Inference
  # ------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: thos-ollama
    restart: unless-stopped
    # No host port binding: only other containers on thos-net (mcp,
    # orchestrator) need to reach Ollama. If you want to pull/manage
    # models from the host directly, temporarily add back
    # `ports: ["11434:11434"]` — just don't leave it published on a
    # shared or internet-facing host.
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - thos-net
    # GPU inference: without this reservation, Ollama silently falls back to
    # CPU, which for a 7B model is the single biggest latency contributor in
    # the whole pipeline. Requires the NVIDIA Container Toolkit on the host
    # (nvidia-ctk runtime configured for Docker). Set OLLAMA_GPU_COUNT=0 (or
    # remove this block) on hosts with no NVIDIA GPU available.
    # Resource limits: without these, Ollama/Chroma/Postgres/etc. can starve
    # each other on a shared host. Every env var below has a default but is
    # overridable per-deploy in .env.
    deploy:
      resources:
        limits:
          cpus: "${OLLAMA_CPU_LIMIT:-4}"
          memory: ${OLLAMA_MEM_LIMIT:-8g}
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_GPU_COUNT:-all}
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  ollama-model-init:
    image: ollama/ollama:latest
    container_name: thos-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - thos-net
    environment:
      OLLAMA_HOST: ollama:11434
      MODEL_NAME: ${OLLAMA_MODEL:-qwen3:4b}
    deploy:
      resources:
        limits:
          cpus: "${OLLAMA_INIT_CPU_LIMIT:-1}"
          memory: ${OLLAMA_INIT_MEM_LIMIT:-512m}
    entrypoint: ["/bin/sh", "-c"]
    # Retries the pull a few times (useful on a slow/flaky first-time
    # download) and DOES NOT swallow the final failure — if the model
    # still isn't present after retries, this container exits non-zero,
    # which (combined with `service_completed_successfully` below) stops
    # mcp/orchestrator from starting against a model that was never
    # actually pulled, instead of silently 404'ing at hunt time.
    command:
      - |
        for i in 1 2 3 4 5; do
          echo "[ollama-model-init] pull attempt $$i for $$MODEL_NAME";
          if ollama pull "$$MODEL_NAME"; then
            echo "[ollama-model-init] pull succeeded";
            break;
          fi;
          echo "[ollama-model-init] pull failed, retrying in 10s...";
          sleep 10;
        done;
        if ! ollama list | grep -q "$$(echo $$MODEL_NAME | cut -d: -f1)"; then
          echo "[ollama-model-init] FATAL: $$MODEL_NAME not present after retries";
          exit 1;
        fi;
        echo "[ollama-model-init] confirmed $$MODEL_NAME is available";
    restart: "no"

  # ------------------------------------------------------------
  # 2. ChromaDB — Vector Store
  # ------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: thos-chromadb
    restart: unless-stopped
    # No host port binding: chromadb has no auth of its own in this stack,
    # so it must stay reachable only from other containers on thos-net
    # (kb-ingest, mcp), not from the host's network.
    volumes:
      - chroma_data:/data
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
      ALLOW_RESET: "TRUE"
    networks:
      - thos-net
    deploy:
      resources:
        limits:
          cpus: "${CHROMA_CPU_LIMIT:-2}"
          memory: ${CHROMA_MEM_LIMIT:-2g}
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/8000"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ------------------------------------------------------------
  # 3. Knowledge Base Ingest
  # ------------------------------------------------------------
  kb-ingest:
    build:
      context: ./services/knowledge
      dockerfile: Dockerfile
    container_name: thos-kb-ingest
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      KB_ROOT: /data/knowledge_base
    volumes:
      - ./data/knowledge_base:/data/knowledge_base:ro
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - thos-net
    deploy:
      resources:
        limits:
          cpus: "${KB_INGEST_CPU_LIMIT:-1}"
          memory: ${KB_INGEST_MEM_LIMIT:-1g}
    restart: "no"

  # ------------------------------------------------------------
  # 4. Postgres — Audit & State
  # ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: thos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thos_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-thos_audit}
    # No host port binding: the password above is a weak default, so the
    # only thing actually keeping this database safe right now is that it's
    # unreachable outside thos-net. Add back `ports: ["5432:5432"]` only for
    # temporary local debugging, and set a real POSTGRES_PASSWORD first.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    networks:
      - thos-net
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPU_LIMIT:-2}"
          memory: ${POSTGRES_MEM_LIMIT:-2g}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thos} -d ${POSTGRES_DB:-thos_audit}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------
  # 5. Redis — Cache / Sessions
  # ------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: thos-redis
    restart: unless-stopped
    # Redis has no auth by default at all, so require a password. Same
    # weak-default-with-warning pattern as the other secrets — the
    # orchestrator/mcp REDIS_URL below must include the same password.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-thos_change_me_redis}"]
    volumes:
      - redis_data:/data
    networks:
      - thos-net
    # No host port binding: only mcp and orchestrator need Redis, and both
    # reach it over thos-net.
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-1}"
          memory: ${REDIS_MEM_LIMIT:-512m}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-thos_change_me_redis}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------
  # 6. SigmaHQ Rules — one-shot corpus initializer
  # ------------------------------------------------------------
  sigmahq-rules-init:
    build:
      context: .
      dockerfile: services/detection/Dockerfile.sigma-init
    container_name: thos-sigmahq-rules-init
    restart: "no"
    environment:
      # Pinned for reproducible deployments. Override deliberately to test
      # another upstream commit; never use a moving branch in production.
      SIGMAHQ_REF: ${SIGMAHQ_REF:-282369fa76c5cd6103b055478fbaebec8530cfa5}
      SIGMAHQ_MIN_RULES: ${SIGMAHQ_MIN_RULES:-2000}
      SIGMAHQ_VENDOR_DIR: /vendor
      SIGMAHQ_RULES_DIR: /rules
    volumes:
      # Prefer a reviewed, committed corpus for offline deployments. The
      # initializer downloads the pinned ref only when this directory and
      # the persistent rules volume do not contain a complete corpus.
      - ./services/detection/sigma_rules_hq:/vendor:ro
      - sigmahq_rules:/rules
    networks:
      - thos-net
    deploy:
      resources:
        limits:
          cpus: "${SIGMAHQ_INIT_CPU_LIMIT:-1}"
          memory: ${SIGMAHQ_INIT_MEM_LIMIT:-512m}

  # ------------------------------------------------------------
  # 7. MCP Server — SOC Tools
  # ------------------------------------------------------------
  mcp:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: thos-mcp
    restart: unless-stopped
    # No host port binding: MCP_AUTH_TOKEN now gates every tool call, but
    # only the orchestrator needs to reach this service, and it does so
    # over thos-net. Add back `ports: ["8100:8100"]` only for temporary
    # local debugging.
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
      THOS_MODEL_FAST: ${THOS_MODEL_FAST:-${OLLAMA_MODEL:-qwen3:4b}}
      THOS_FAST_GENERATION_TIMEOUT_SECONDS: ${THOS_FAST_GENERATION_TIMEOUT_SECONDS:-60}
      OLLAMA_GENERATION_RETRIES: ${OLLAMA_GENERATION_RETRIES:-3}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      REDIS_URL: redis://:${REDIS_PASSWORD:-thos_change_me_redis}@redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-thos}:${POSTGRES_PASSWORD:-thos_change_me}@postgres:5432/${POSTGRES_DB:-thos_audit}
      MCP_PORT: 8100
      MCP_TRANSPORT: streamable-http
      # Structured JSON logs to stdout (services/observability/logging_config.py).
      # One of DEBUG/INFO/WARNING/ERROR.
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NO_REBIND_PROTECTION: "1"
      # Shared secret the orchestrator must present as a bearer token on
      # every MCP tool call. Must match the orchestrator's MCP_AUTH_TOKEN
      # below. Change this in .env before deploying anywhere but a
      # trusted local dev box.
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-thos_change_me_mcp_token}
      REPORTS_DIR: /data/reports
      DETECTION_PROPOSALS_DIR: /data/detection_rule_proposals
      SIEM_TYPE: ${SIEM_TYPE:-mock}
      LOG_SOURCE_DIR: /data/log_sources
      WAZUH_INDEXER_URL: ${WAZUH_INDEXER_URL:-https://host.docker.internal:9200}
      WAZUH_INDEXER_USERNAME: ${WAZUH_INDEXER_USERNAME:-}
      WAZUH_INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:-}
      WAZUH_VERIFY_SSL: ${WAZUH_VERIFY_SSL:-1}
      WAZUH_CA_BUNDLE: ${WAZUH_CA_BUNDLE:-}
      WAZUH_INDEX_SOURCE: ${WAZUH_INDEX_SOURCE:-both}
      WAZUH_LOOKBACK_MINUTES: ${WAZUH_LOOKBACK_MINUTES:-1440}
      WAZUH_REQUEST_TIMEOUT_SECONDS: ${WAZUH_REQUEST_TIMEOUT_SECONDS:-30}
      WAZUH_MAX_RESULTS: ${WAZUH_MAX_RESULTS:-1000}
    volumes:
      - ./data/reports:/data/reports
      - ./data/detection_rule_proposals:/data/detection_rule_proposals
      - ./data/threat_intel:/data/threat_intel:ro
      - ./data/log_sources:/data/log_sources
      # The initializer guarantees this volume has the pinned community
      # corpus before MCP starts; MCP only receives a read-only view.
      - sigmahq_rules:/repo/services/detection/sigma_rules_hq:ro
    deploy:
      resources:
        limits:
          cpus: "${MCP_CPU_LIMIT:-2}"
          memory: ${MCP_MEM_LIMIT:-2g}
    depends_on:
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama-model-init:
        condition: service_completed_successfully
      sigmahq-rules-init:
        condition: service_completed_successfully
    networks:
      - thos-net

  # ------------------------------------------------------------
  # 8. Orchestrator — LangGraph Engine
  # ------------------------------------------------------------
  orchestrator:
    build:
      context: .
      dockerfile: services/orchestration/Dockerfile
    container_name: thos-orchestrator
    restart: unless-stopped
    # No host port binding: ORCHESTRATOR_API_KEY now gates every functional
    # endpoint, but only the chat-ui needs to reach this service, and it
    # does so over thos-net. Add back `ports: ["8200:8200"]` only for
    # temporary local debugging.
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
      THOS_MODEL_REASONING: ${THOS_MODEL_REASONING:-${OLLAMA_MODEL:-qwen3:4b}}
      OLLAMA_GENERATION_TIMEOUT_SECONDS: ${OLLAMA_GENERATION_TIMEOUT_SECONDS:-180}
      OLLAMA_GENERATION_RETRIES: ${OLLAMA_GENERATION_RETRIES:-3}
      MAX_REASONING_FOLLOWUPS: ${MAX_REASONING_FOLLOWUPS:-1}
      MCP_SERVER_URL: http://mcp:8100/mcp
      # Must match mcp's MCP_AUTH_TOKEN above — this is how the orchestrator
      # authenticates to the MCP server as a client.
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-thos_change_me_mcp_token}
      # Callers of *this* service (the chat UI, or any other client) must
      # send `Authorization: Bearer <ORCHESTRATOR_API_KEY>`. Must match
      # chat-ui's ORCHESTRATOR_API_KEY below.
      ORCHESTRATOR_API_KEY: ${ORCHESTRATOR_API_KEY:-thos_change_me_orchestrator_key}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-thos}:${POSTGRES_PASSWORD:-thos_change_me}@postgres:5432/${POSTGRES_DB:-thos_audit}
      REDIS_URL: redis://:${REDIS_PASSWORD:-thos_change_me_redis}@redis:6379/0
      REPORTS_DIR: /data/reports
      DETECTION_PROPOSALS_DIR: /data/detection_rule_proposals
      # Structured JSON logs to stdout (services/observability/logging_config.py).
      # One of DEBUG/INFO/WARNING/ERROR.
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data/reports:/data/reports
      - ./data/detection_rule_proposals:/data/detection_rule_proposals
      - ./data/threat_intel:/data/threat_intel:ro
    deploy:
      resources:
        limits:
          cpus: "${ORCHESTRATOR_CPU_LIMIT:-2}"
          memory: ${ORCHESTRATOR_MEM_LIMIT:-2g}
    depends_on:
      mcp:
        condition: service_started
      ollama:
        condition: service_healthy
      ollama-model-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - thos-net

  # ------------------------------------------------------------
  # 9. Chat UI — Gradio hunter interface
  # ------------------------------------------------------------
  chat-ui:
    build:
      context: ./services/api
      dockerfile: Dockerfile.chatui
    container_name: thos-chat-ui
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8200
      # Must match orchestrator's ORCHESTRATOR_API_KEY above — this is how
      # the chat UI authenticates to the orchestrator API as a client.
      ORCHESTRATOR_API_KEY: ${ORCHESTRATOR_API_KEY:-thos_change_me_orchestrator_key}
      # Gates the Gradio app itself behind a login page. Change these in
      # .env before deploying anywhere but a trusted local dev box.
      # Single-user default:
      CHATUI_USERNAME: ${CHATUI_USERNAME:-analyst}
      CHATUI_PASSWORD: ${CHATUI_PASSWORD:-thos_change_me}
      # For more than one hunter login, set CHATUI_USERS instead (takes
      # precedence over CHATUI_USERNAME/CHATUI_PASSWORD when non-empty):
      #   CHATUI_USERS=alice:pw1,bob:pw2
      CHATUI_USERS: ${CHATUI_USERS:-}
      REPORTS_DIR: /data/reports
      LOG_SOURCE_DIR: /data/log_sources
      # Structured JSON logs to stdout (self-contained setup in app.py --
      # see the comment there for why it doesn't share
      # services/observability/logging_config.py). One of
      # DEBUG/INFO/WARNING/ERROR.
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data/reports:/data/reports
      - ./data/log_sources:/data/log_sources
    deploy:
      resources:
        limits:
          cpus: "${CHATUI_CPU_LIMIT:-1}"
          memory: ${CHATUI_MEM_LIMIT:-1g}
    depends_on:
      - orchestrator
    networks:
      - thos-net
